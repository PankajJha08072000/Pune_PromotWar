<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuralLearn - Simple Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a12;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: #16162a;
      border-right: 1px solid #2a2a4a;
      padding: 20px;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }

    .sidebar h2 {
      color: #a78bfa;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-avatar {
      font-size: 24px;
    }

    .message-content {
      background: #1e1e38;
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 60%;
      word-wrap: break-word;
    }

    .message.user .message-content {
      background: #a78bfa;
      color: #0a0a12;
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      background: #16162a;
      border: 1px solid #2a2a4a;
      color: #e2e8f0;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    #userInput:focus {
      outline: none;
      border-color: #a78bfa;
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.1);
    }

    #sendBtn {
      background: #a78bfa;
      color: #0a0a12;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    #sendBtn:hover:not(:disabled) {
      background: #c4b5fd;
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #menuBtn {
      background: none;
      border: none;
      color: #a78bfa;
      font-size: 20px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .console {
      background: #1e1e38;
      border-top: 1px solid #2a2a4a;
      padding: 10px;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
      color: #60a5fa;
      font-family: 'Courier New', monospace;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e38;
      border-radius: 8px;
      width: fit-content;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #a78bfa;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <button id="menuBtn">☰ Menu</button>
    <h2>NeuralLearn</h2>
    <p style="font-size: 12px; color: #888;">Simple test version</p>
  </aside>

  <!-- Main chat area -->
  <div class="main">
    <div class="chat-area" id="chatArea">
      <div style="text-align: center; color: #888; padding: 40px 20px;">
        <h1 style="color: #a78bfa; margin-bottom: 10px;">🧠 NeuralLearn</h1>
        <p>Simple test version - buttons should work</p>
      </div>
    </div>

    <!-- Typing indicator -->
    <div id="typingIndicator" style="display: none; padding: 20px;">
      <div class="typing-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message... (or press Enter)"
      />
      <button id="sendBtn" disabled>Send</button>
    </div>

    <!-- Console for debugging -->
    <div class="console" id="console"></div>
  </div>

  <script>
    // Capture console logs
    const consoleDiv = document.getElementById('console');
    const originalLog = console.log;
    const originalError = console.error;

    console.log = (...args) => {
      const msg = args.join(' ');
      const line = document.createElement('div');
      line.textContent = msg;
      consoleDiv.appendChild(line);
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
      originalLog(...args);
    };

    console.error = (...args) => {
      const msg = args.join(' ');
      const line = document.createElement('div');
      line.style.color = '#f472b6';
      line.textContent = '❌ ' + msg;
      consoleDiv.appendChild(line);
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
      originalError(...args);
    };
  </script>

  <!-- Load minimal app -->
  <script src="app-simple.js"></script>
</body>
</html>
